<style>
  :root {
    --royal: #1550e0;
    --azure: #2f81f7;
    --sky: #63b3ff;
    --ink: #0d1b34;
    --panel: #13234a;
    --panel-2: #0f1c3d;
    --text: #eaf2ff;
    --gold: #ffd75e;
    --mint: #4ade80;
    --coral: #ff6b61;
    --sans: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", "Segoe UI", Roboto, sans-serif;
    --accent: var(--sky);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: radial-gradient(900px 500px at 50% -10%, #16295e 0%, transparent 60%), var(--ink);
    color: var(--text); font-family: var(--sans);
    -webkit-font-smoothing: antialiased; min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    padding: 18px 16px 60px; overflow-x: hidden; line-height: 1.5;
  }
  .mosaic { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .mosaic i { position: absolute; display: block; border-radius: 4px; opacity: .5; animation: drift 16s ease-in-out infinite; }
  @keyframes drift { 0%,100% { transform: translateY(0);} 50% { transform: translateY(-18px);} }
  @media (prefers-reduced-motion: reduce) { .mosaic i, .cat-box, .topic-card .tc-cat { animation: none !important; } }

  .topbar { width: 100%; max-width: 820px; z-index: 1; display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .topbar a { color: var(--sky); font-size: 13px; font-weight: 600; text-decoration: none; display: flex; align-items: center; gap: 8px; }
  .topbar a img { width: 28px; height: 28px; border-radius: 8px; }
  .topbar a:hover { color: #fff; }

  .header { z-index: 1; text-align: center; margin-bottom: 24px; }
  .header h1 {
    font-size: clamp(26px, 5vw, 40px); font-weight: 800; letter-spacing: -0.02em;
    background: linear-gradient(100deg, var(--sky), #9ecbff);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .header .sub { font-size: 13px; color: #7fa4d9; margin-top: 6px; }

  .screen { z-index: 1; width: 100%; max-width: 820px; }
  .hidden { display: none !important; }

  /* ---------- TOPIC MENU ---------- */
  .topic-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 18px; }
  .topic-card {
    background: linear-gradient(180deg, var(--panel), var(--panel-2));
    border: 2px solid #27407a; border-radius: 20px; padding: 26px 22px; text-align: center;
    cursor: pointer; transition: transform .18s ease, border-color .18s ease, box-shadow .18s ease;
    display: flex; flex-direction: column; align-items: center;
  }
  .topic-card:hover, .topic-card:focus-visible { transform: translateY(-5px); border-color: var(--tc-accent, var(--sky)); box-shadow: 0 14px 34px rgba(0,0,0,.34); }
  .topic-card .tc-cat { animation: idle 3.4s ease-in-out infinite; margin-bottom: 14px; }
  @keyframes idle { 0%,100% { transform: translateY(0);} 50% { transform: translateY(-5px);} }
  .topic-card h3 { font-size: 19px; font-weight: 800; letter-spacing: -0.01em; margin-bottom: 4px; }
  .topic-card .tc-name { font-size: 12.5px; color: var(--tc-accent, var(--sky)); font-weight: 600; margin-bottom: 10px; }
  .topic-card p { font-size: 13.5px; color: #b8c9ea; }
  .topic-card .tc-count { font-size: 11.5px; color: #6f8bbc; margin-top: 12px; }
  .topic-card.soon { opacity: .5; cursor: default; }
  .topic-card.soon:hover { transform: none; border-color: #27407a; box-shadow: none; }
  .menu-hint { font-size: 12.5px; color: #6f8bbc; text-align: center; margin-top: 20px; }

  /* ---------- CAT ---------- */
  .cat-box { position: relative; display: flex; justify-content: center; margin-bottom: 18px; animation: idle 3.4s ease-in-out infinite; }
  .cat-box.talking { animation: hop .4s steps(2) infinite; }
  @keyframes hop { 0%,100% { transform: translateY(0);} 50% { transform: translateY(-6px);} }
  .char-img { display: block; image-rendering: pixelated; }
  .char-img.pop { animation: pop .38s ease; }
  @keyframes pop { 0% { transform: scale(.9);} 55% { transform: scale(1.07);} 100% { transform: scale(1);} }
  .catgrid { display: grid; }
  .catgrid div { }

  /* ---------- QUIZ ---------- */
  .quiz-top { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .quiz-top .qt-name { font-size: 14px; font-weight: 700; color: var(--accent); }
  .progress-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; font-size: 13px; color: #8fa9d6; }
  .progress-row .score { color: var(--gold); font-weight: 700; }
  .pbar { height: 6px; background: #1a2c58; border-radius: 100px; overflow: hidden; margin-bottom: 20px; }
  .pbar > div { height: 100%; background: linear-gradient(90deg, var(--azure), var(--accent)); transition: width .3s ease; }

  .card { background: linear-gradient(180deg, var(--panel), var(--panel-2)); border: 1px solid #27407a; border-radius: 18px; padding: 22px 22px 24px; box-shadow: 0 10px 30px rgba(0,0,0,.3); }
  .quiz-body { display: flex; gap: 18px; align-items: flex-start; }
  @media (max-width: 640px) { .quiz-body { flex-direction: column; align-items: center; } }
  .quiz-cat { flex-shrink: 0; }
  .quiz-q { flex: 1; width: 100%; }
  .qtype { display: inline-block; font-size: 12px; font-weight: 700; letter-spacing: .04em; color: var(--royal); background: #dbe9ff; padding: 5px 12px; border-radius: 100px; margin-bottom: 6px; }
  .qctx { font-size: 12.5px; color: #8fa9d6; margin-bottom: 12px; }
  .qenun { font-size: 15.5px; color: #eaf2ff; line-height: 1.65; margin-bottom: 14px; }
  .qtable { margin: 0 0 16px; overflow-x: auto; }
  .qtable table { border-collapse: collapse; font-size: 13.5px; min-width: 240px; }
  .qtable th, .qtable td { border: 1px solid #2c447e; padding: 8px 14px; text-align: center; }
  .qtable thead th { background: #1a2c58; color: var(--sky); font-weight: 700; }
  .qtable tbody th { background: #14264f; color: #cddcff; font-weight: 600; text-align: left; }
  .qtable tbody td { color: #eaf2ff; }

  /* ---------- CHART (barras / torta) ---------- */
  .qchart { margin: 0 0 16px; }
  .bar-chart { display: flex; align-items: flex-end; gap: 14px; height: 150px; padding: 6px 4px 0; overflow-x: auto; }
  .bar-chart .bar-col { display: flex; flex-direction: column; align-items: center; justify-content: flex-end; flex: 1 0 auto; min-width: 44px; height: 100%; }
  .bar-chart .bar-val { font-size: 12px; font-weight: 700; color: var(--accent); margin-bottom: 4px; }
  .bar-chart .bar-rect { width: 30px; border-radius: 6px 6px 0 0; background: linear-gradient(180deg, var(--accent), var(--azure)); }
  .bar-chart .bar-lbl { font-size: 11px; color: #9fb6de; margin-top: 6px; text-align: center; max-width: 64px; }
  .pie-wrap { display: flex; gap: 18px; align-items: center; flex-wrap: wrap; }
  .pie-circle { width: 130px; height: 130px; border-radius: 50%; flex-shrink: 0; box-shadow: 0 0 0 1px #2c447e; }
  .pie-legend { display: flex; flex-direction: column; gap: 6px; font-size: 12.5px; }
  .pie-legend .pl-row { display: flex; align-items: center; gap: 8px; color: #eaf2ff; }
  .pie-legend .pl-sw { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }
  .pie-legend .pl-pct { color: #9fb6de; margin-left: auto; padding-left: 10px; }
  .qchart-n { font-size: 12px; color: #8fa9d6; margin-top: 8px; }
  .box-plot { padding: 18px 10px 4px; }
  .box-track { position: relative; height: 44px; }
  .box-whisker { position: absolute; top: 21px; height: 2px; background: var(--accent); }
  .box-cap { position: absolute; top: 12px; width: 2px; height: 20px; background: var(--accent); }
  .box-rect { position: absolute; top: 4px; height: 36px; background: rgba(99,179,255,.16); border: 2px solid var(--accent); border-radius: 4px; }
  .box-med { position: absolute; top: 4px; width: 3px; height: 36px; background: var(--gold); }
  .box-axis { position: relative; height: 20px; margin-top: 6px; }
  .box-lbl { position: absolute; transform: translateX(-50%); font-size: 11.5px; color: #9fb6de; white-space: nowrap; }
  .qask { font-size: 15px; font-weight: 700; color: var(--gold); margin-bottom: 14px; }

  .alts { display: flex; flex-direction: column; gap: 11px; }
  .alt-btn { background: #0c1836; border: 2px solid #27407a; border-radius: 13px; color: var(--text); font-family: var(--sans); font-size: 15px; padding: 15px 16px; cursor: pointer; text-align: left; display: flex; gap: 13px; align-items: center; transition: border-color .15s, background .15s, transform .1s; }
  .alt-btn:hover:not(:disabled) { border-color: var(--accent); background: #0f1f44; transform: translateX(2px); }
  .alt-btn:disabled { cursor: default; }
  .alt-btn .key { flex-shrink: 0; width: 30px; height: 30px; border-radius: 8px; background: #1a2c58; color: var(--accent); font-weight: 700; font-size: 14px; display: flex; align-items: center; justify-content: center; }
  .alt-btn.correct { border-color: var(--mint); background: rgba(74,222,128,.13); }
  .alt-btn.correct .key { background: var(--mint); color: #06331b; }
  .alt-btn.wrong { border-color: var(--coral); background: rgba(255,107,97,.12); }
  .alt-btn.wrong .key { background: var(--coral); color: #3a0806; }

  .pauta { display: none; margin-top: 18px; background: #ffffff; color: #14203a; border-radius: 14px; padding: 20px 20px 18px; box-shadow: 0 8px 24px rgba(0,0,0,.28); }
  .pauta .p-flag { font-size: 14px; font-weight: 800; margin-bottom: 12px; }
  .pauta.good .p-flag { color: #10893e; }
  .pauta.bad .p-flag { color: #d33328; }
  .pauta .p-head { font-size: 14px; color: #2a3a5c; margin-bottom: 12px; line-height: 1.7; }
  .pauta .p-steps { display: flex; flex-direction: column; gap: 10px; margin: 8px 0 14px; }
  .pauta .p-step { background: #f4f7ff; border-left: 3px solid var(--royal); border-radius: 8px; padding: 11px 14px; overflow-x: auto; }
  .pauta .p-conc { font-size: 13.5px; color: #14203a; background: #eef5ff; border-radius: 8px; padding: 12px 14px; line-height: 1.6; }
  .pauta .p-conc b { color: var(--royal); }

  .nav-row { margin-top: 18px; display: flex; gap: 10px; justify-content: space-between; }
  .btn { background: linear-gradient(180deg, var(--azure), var(--royal)); border: none; border-radius: 13px; color: #fff; font-family: var(--sans); font-size: 15px; font-weight: 700; padding: 14px 26px; cursor: pointer; box-shadow: 0 6px 18px rgba(21,80,224,.34); transition: transform .15s ease, filter .2s; }
  .btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
  .btn.ghost { background: transparent; color: var(--accent); border: 2px solid var(--royal); box-shadow: none; }
  .btn.ghost:hover { background: var(--royal); color: #fff; }

  .final { text-align: center; }
  .final .ring { width: 130px; height: 130px; border-radius: 50%; margin: 6px auto 16px; display: flex; align-items: center; justify-content: center; background: conic-gradient(var(--accent) var(--deg,0deg), #1a2c58 0deg); }
  .final .ring .inner { width: 106px; height: 106px; border-radius: 50%; background: var(--panel-2); display: flex; align-items: center; justify-content: center; flex-direction: column; }
  .final .ring .big { font-size: 30px; font-weight: 800; color: #fff; }
  .final .ring .lbl { font-size: 11px; color: #8fa9d6; }
  .final h2 { font-size: 22px; font-weight: 800; margin-bottom: 10px; }
  .final p { font-size: 15px; color: #c7d6f2; max-width: 520px; margin: 0 auto 6px; }
  :focus-visible { outline: 3px solid var(--gold); outline-offset: 2px; }
  .katex { font-size: 1.05em; }
</style>
</head>

<script>
/* ---------------- pixel cat sprite (scholar w/ glasses) ---------------- */
const SPRITE = [
"...KK..........KK...",
"..KBBK........KBBK..",
".KBPPBK......KBPPBK.",
".KBPPBBKKKKKKBBPPBK.",
".KBBBBBBBBBBBBBBBBK.",
"KBBBBBBBBBBBBBBBBBBK",
"KBAAAAABBBBAAAAAABK",
"KBAEGAABbBBAAEGAABK",
"KBAAAABWWWWBAAAAABK",
"KBbBBBWWPPWWBBBBbBK",
".KBBBBBWWWWBBBBBBK.",
".KBBYYYYYRYYYYYBBK.",
".KBBBBBBBBBBBBBBBBK.",
".KBbBBBBBBBBBBBBbBK.",
"..KBBKKBBBBBBKKBBK..",
"...KK..KKKKKK..KK..."
];
function palette(body, shade) {
  return { '.':null,'K':'#0a1226','B':body,'b':shade,'W':'#ffffff','w':'#dbe9ff',
           'E':'#0a1226','G':'#cfe8ff','P':'#ff9ecb','Y':'#ffd75e','A':'#12203c','R':'#e8342a' };
}
function drawCat(el, cell, pal) {
  el.innerHTML = '';
  el.style.gridTemplateColumns = `repeat(20, ${cell}px)`;
  el.style.gridAutoRows = `${cell}px`;
  SPRITE.forEach(row => { for (const ch of row) {
    const d = document.createElement('div');
    d.style.width = cell+'px'; d.style.height = cell+'px';
    if (pal[ch]) d.style.background = pal[ch];
    el.appendChild(d);
  }});
}

/* Draws the topic mascot: image sprite with mood (if the topic has one) or the pixel cat. */
function drawChar(el, cell, t, mood) {
  if (t.imgs) {
    const size = cell * 22;
    el.style.gridTemplateColumns = 'none';
    el.innerHTML = `<img class="char-img pop" src="${t.imgs[mood] || t.imgs.neutro}" alt="${t.name}" width="${size}" height="${size}">`;
    const img = el.firstChild;
    img.addEventListener('animationend', () => img.classList.remove('pop'), { once: true });
  } else {
    drawCat(el, cell, palette(t.body, t.shade));
  }
}

/* ---------------- topics (extensible) ---------------- */
const TOPICS = [
  {
    id:'vc', title:'Gato de las Variables', name:'Clasificación de Variables',
    desc:'Identifica la variable de estudio y clasifícala: nominal, ordinal, discreta o continua.',
    bank: (typeof VC_QUESTIONS!=='undefined') ? VC_QUESTIONS : [],
    body:'#eab308', shade:'#b98a06', accent:'#fde047',
    guide:'Guía 0 — Identificación y Clasificación de Variables'
  },
  {
    id:'ic', title:'Chica de Intervalos', name:'Intervalos de Confianza',
    desc:'Media (z y t) y proporción. Elige el intervalo correcto entre 4 alternativas.',
    bank: (typeof IC_QUESTIONS!=='undefined') ? IC_QUESTIONS : [],
    body:'#3b8bff', shade:'#2f6fe0', accent:'#63b3ff',
    guide:'Guía 5 — Intervalos de Confianza',
    imgs:{ saludo:'chica/saludo.png', neutro:'chica/neutro.png', exito:'chica/exito.png', tristesa:'chica/tristesa.png' }
  },
  {
    id:'th', title:'Gato de Test', name:'Test de Hipótesis',
    desc:'Media con σ conocida (Z) y desconocida (t). Calcula el estadístico y decide sobre H₀.',
    bank: (typeof TH_QUESTIONS!=='undefined') ? TH_QUESTIONS : [],
    body:'#f0883e', shade:'#d96f22', accent:'#ffb066',
    guide:'Guía 6 — Test de Hipótesis'
  },
  {
    id:'nm', title:'Gato de la Normal', name:'Probabilidades con la Normal',
    desc:'Estandariza X ~ N(μ,σ) y calcula P(X<x), P(X>x) o P(x₁<X<x₂) con la tabla Φ(z).',
    bank: (typeof NM_QUESTIONS!=='undefined') ? NM_QUESTIONS : [],
    body:'#a78bfa', shade:'#7c5cf0', accent:'#c4b5fd',
    guide:'Guía 4 — Distribución Normal'
  },
  {
    id:'pc', title:'Gato Condicional', name:'Probabilidad Condicional',
    desc:'Tablas de contingencia: probabilidad conjunta P(A∩B), unión P(A∪B) y condicional P(A|B).',
    bank: (typeof PC_QUESTIONS!=='undefined') ? PC_QUESTIONS : [],
    body:'#f472b6', shade:'#db2f8f', accent:'#f9a8d4',
    guide:'Guía de Probabilidad Condicional'
  },
  {
    id:'bt', title:'Gato de Bayes', name:'Probabilidad Total y Bayes',
    desc:'Diagramas de árbol: calcula la probabilidad total de un resultado y actualiza la causa con Bayes.',
    bank: (typeof BT_QUESTIONS!=='undefined') ? BT_QUESTIONS : [],
    body:'#34d399', shade:'#0ea371', accent:'#6ee7b7',
    guide:'Guía de Probabilidad Total y Bayes'
  },
  {
    id:'cn', title:'Gato Nominal', name:'Datos Cualitativos Nominales',
    desc:'Tablas de frecuencia (f_i, h_i, h_i%): constrúyelas desde datos crudos, léelas o interprétalas desde un gráfico.',
    bank: (typeof CN_QUESTIONS!=='undefined') ? CN_QUESTIONS : [],
    body:'#38bdf8', shade:'#0ea5c7', accent:'#7dd3fc',
    guide:'Guía — Tablas de Frecuencia (Datos Cualitativos Nominales)'
  },
  {
    id:'cd', title:'Gato Discreto', name:'Datos Cuantitativos Discretos',
    desc:'Tablas con acumuladas (F_i, H_i), lectura "a lo más / más de", y media, mediana y moda desde datos o tablas.',
    bank: (typeof CD_QUESTIONS!=='undefined') ? CD_QUESTIONS : [],
    body:'#a3e635', shade:'#7bb418', accent:'#bef264',
    guide:'Guía — Tablas de Frecuencia (Datos Cuantitativos Discretos)'
  },
  {
    id:'mv', title:'Gato Variable', name:'Medidas de Variabilidad',
    desc:'Rango, varianza s², desviación estándar y coeficiente de variación; compara homogeneidad entre variables con el CV.',
    bank: (typeof MV_QUESTIONS!=='undefined') ? MV_QUESTIONS : [],
    body:'#fb923c', shade:'#d9701c', accent:'#fdba74',
    guide:'Guía — Medidas de Variabilidad (Datos Cuantitativos Discretos)'
  },
  {
    id:'pb', title:'Gato de la Caja', name:'Percentiles y Boxplot',
    desc:'Interpreta percentiles, cuartiles y deciles en contexto, y lee diagramas de caja: RIC, mediana, atípicos y el 50% central.',
    bank: (typeof PB_QUESTIONS!=='undefined') ? PB_QUESTIONS : [],
    body:'#e879f9', shade:'#c026d3', accent:'#f0abfc',
    guide:'Guía — Interpretación de Percentiles y Diagrama de Caja'
  }
];

/* ---------------- chart renderer (barras / torta) ---------------- */
const CHART_PALETTE = ['#63b3ff','#4ade80','#ffd75e','#ff6b61','#a78bfa','#f472b6','#34d399','#f0883e'];
function renderChart(chart) {
  if (chart.type === 'bar') {
    const max = Math.max(...chart.values) || 1;
    const cols = chart.labels.map((lbl, i) => {
      const v = chart.values[i];
      const hpct = Math.max(6, Math.round(v / max * 88));
      return `<div class="bar-col"><span class="bar-val">${v}</span><div class="bar-rect" style="height:${hpct}%;background:${CHART_PALETTE[i % CHART_PALETTE.length]}"></div><span class="bar-lbl">${lbl}</span></div>`;
    }).join('');
    return `<div class="bar-chart">${cols}</div><div class="qchart-n">${chart.unit || ''}</div>`;
  }
  if (chart.type === 'box') {
    const span = chart.max - chart.min || 1;
    const pad = span * 0.06;
    const lo = chart.min - pad, hi = chart.max + pad;
    const X = v => ((v - lo) / (hi - lo) * 100).toFixed(2) + '%';
    const marks = [chart.min, chart.q1, chart.med, chart.q3, chart.max];
    const labels = marks.map(v => `<span class="box-lbl" style="left:${X(v)}">${String(v).replace('.', ',')}</span>`).join('');
    return `<div class="box-plot">
      <div class="box-track">
        <div class="box-whisker" style="left:${X(chart.min)};width:calc(${X(chart.q1)} - ${X(chart.min)})"></div>
        <div class="box-whisker" style="left:${X(chart.q3)};width:calc(${X(chart.max)} - ${X(chart.q3)})"></div>
        <div class="box-cap" style="left:${X(chart.min)}"></div>
        <div class="box-cap" style="left:${X(chart.max)}"></div>
        <div class="box-rect" style="left:${X(chart.q1)};width:calc(${X(chart.q3)} - ${X(chart.q1)})"></div>
        <div class="box-med" style="left:${X(chart.med)}"></div>
      </div>
      <div class="box-axis">${labels}</div>
    </div><div class="qchart-n">${chart.unit || ''}</div>`;
  }
  if (chart.type === 'pie') {
    let acc = 0;
    const stops = chart.labels.map((lbl, i) => {
      const start = acc; acc += chart.pct[i];
      return `${CHART_PALETTE[i % CHART_PALETTE.length]} ${start}% ${acc}%`;
    }).join(', ');
    const legend = chart.labels.map((lbl, i) =>
      `<div class="pl-row"><span class="pl-sw" style="background:${CHART_PALETTE[i % CHART_PALETTE.length]}"></span>${lbl}<span class="pl-pct">${chart.pct[i]}%</span></div>`
    ).join('');
    return `<div class="pie-wrap"><div class="pie-circle" style="background:conic-gradient(${stops})"></div><div class="pie-legend">${legend}</div></div><div class="qchart-n">Total N = ${chart.N}</div>`;
  }
  return '';
}

/* ---------------- KaTeX ---------------- */
function renderMath(el) {
  if (window.renderMathInElement) {
    renderMathInElement(el, { delimiters:[
      {left:'$',right:'$',display:false},{left:'\\(',right:'\\)',display:false}
    ], throwOnError:false });
  }
}

/* ---------------- build menu ---------------- */
const topicGrid = document.getElementById('topicGrid');
TOPICS.forEach((t, i) => {
  const card = document.createElement('button');
  card.className = 'topic-card';
  card.style.setProperty('--tc-accent', t.accent);
  card.innerHTML = `<div class="tc-cat"><div class="catgrid" id="menuCat${i}"></div></div>
    <h3>${t.title}</h3><div class="tc-name">${t.name}</div><p>${t.desc}</p>
    <div class="tc-count">${t.bank.length} ejercicios · 5 por ronda</div>`;
  card.addEventListener('click', () => startTopic(i));
  topicGrid.appendChild(card);
  drawChar(card.querySelector(`#menuCat${i}`), 6, t, 'saludo');
});

/* ---------------- game state ---------------- */
const menuScreen = document.getElementById('menuScreen');
const quizScreen = document.getElementById('quizScreen');
const finalScreen = document.getElementById('finalScreen');
const altsEl = document.getElementById('alts');
const pauta = document.getElementById('pauta');
const nextBtn = document.getElementById('nextBtn');
const quizCatBox = document.getElementById('quizCatBox');

const N_QUIZ = 5;
let topic = null, round = [], idx = 0, score = 0, answered = false, order = [];

function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

function startTopic(i) {
  topic = TOPICS[i];
  document.documentElement.style.setProperty('--accent', topic.accent);
  drawChar(document.getElementById('quizCatGrid'), 6, topic, 'neutro');
  const pool = shuffle([...Array(topic.bank.length).keys()]).slice(0, N_QUIZ);
  round = pool.map(k => topic.bank[k]);
  idx = 0; score = 0;
  menuScreen.classList.add('hidden');
  finalScreen.classList.add('hidden');
  quizScreen.classList.remove('hidden');
  showQuestion();
}

function showQuestion() {
  const q = round[idx];
  answered = false;
  pauta.style.display = 'none'; pauta.className = 'pauta';
  nextBtn.classList.add('hidden');
  document.getElementById('qCounter').textContent = `Pregunta ${idx+1} de ${N_QUIZ}`;
  document.getElementById('scoreLabel').textContent = `${score} correctas`;
  document.getElementById('pbarFill').style.width = `${idx/N_QUIZ*100}%`;
  document.getElementById('qType').textContent = q.tipo;
  document.getElementById('qCtx').textContent = q.ctx;
  document.getElementById('qEnun').textContent = q.enun;
  const tEl = document.getElementById('qTable');
  if (q.chart) {
    tEl.innerHTML = renderChart(q.chart);
    tEl.className = 'qchart';
  } else if (q.table) {
    tEl.className = 'qtable';
    let html = '<table><thead><tr>' + q.table.head.map(h => `<th>${h}</th>`).join('') + '</tr></thead><tbody>';
    q.table.rows.forEach(r => {
      html += '<tr><th>' + r[0] + '</th>' + r.slice(1).map(c => `<td>${c}</td>`).join('') + '</tr>';
    });
    html += '</tbody></table>';
    if (q.table.N) html += `<div style="font-size:12px;color:#8fa9d6;margin-top:6px">Total N = ${q.table.N}</div>`;
    tEl.innerHTML = html;
  } else { tEl.className = 'qtable'; tEl.innerHTML = ''; }
  document.getElementById('qAsk').textContent = q.ask;
  order = shuffle([0,1,2,3]);
  const letters = ['A','B','C','D'];
  altsEl.innerHTML = '';
  order.forEach((origIdx, pos) => {
    const b = document.createElement('button');
    b.className = 'alt-btn'; b.dataset.orig = origIdx;
    b.innerHTML = `<span class="key">${letters[pos]}</span><span>${q.alts[origIdx]}</span>`;
    b.addEventListener('click', () => answer(pos));
    altsEl.appendChild(b);
  });
  renderMath(document.querySelector('.quiz-q'));
  drawChar(document.getElementById('quizCatGrid'), 6, topic, 'neutro');
  quizCatBox.classList.add('talking');
  setTimeout(() => quizCatBox.classList.remove('talking'), 500);
}

function answer(pos) {
  if (answered) return;
  answered = true;
  const q = round[idx];
  const btns = [...altsEl.querySelectorAll('.alt-btn')];
  btns.forEach(b => b.disabled = true);
  const chosenOrig = parseInt(btns[pos].dataset.orig, 10);
  const correctPos = order.indexOf(q.correct);
  btns[correctPos].classList.add('correct');
  const good = chosenOrig === q.correct;
  if (good) { score++; document.getElementById('scoreLabel').textContent = `${score} correctas`; }
  else btns[pos].classList.add('wrong');
  drawChar(document.getElementById('quizCatGrid'), 6, topic, good ? 'exito' : 'tristesa');
  pauta.classList.add(good ? 'good' : 'bad');
  document.getElementById('pFlag').textContent = good ? '✓ ¡Correcto, miau!' : '✗ Incorrecto — revisa la pauta:';
  document.getElementById('pHead').innerHTML = `$${q.pautaHead}$`;
  const steps = document.getElementById('pSteps');
  steps.innerHTML = '';
  q.pautaSteps.forEach(s => {
    const d = document.createElement('div'); d.className = 'p-step';
    d.innerHTML = `\\(${s}\\)`; steps.appendChild(d);
  });
  document.getElementById('pConc').innerHTML = q.conc;
  renderMath(pauta);
  pauta.style.display = 'block';
  nextBtn.classList.remove('hidden');
  nextBtn.textContent = (idx+1 < N_QUIZ) ? 'Siguiente ▶' : 'Ver resultado ★';
  document.getElementById('pbarFill').style.width = `${(idx+1)/N_QUIZ*100}%`;
  nextBtn.focus();
}

function next() {
  idx++;
  if (idx < N_QUIZ) showQuestion();
  else showFinal();
}

function showFinal() {
  quizScreen.classList.add('hidden');
  finalScreen.classList.remove('hidden');
  drawChar(document.getElementById('finalCatGrid'), 6, topic, (score / N_QUIZ >= 0.6) ? 'exito' : 'tristesa');
  document.getElementById('finalScore').textContent = `${score}/${N_QUIZ}`;
  document.getElementById('ring').style.setProperty('--deg', `${score/N_QUIZ*360}deg`);
  const pct = score / N_QUIZ;
  let t, m;
  if (pct === 1) { t = '¡Purrfecto! ✦'; m = `Dominas ${topic.name}. ᕕ(=^･ω･^=)ᕗ`; }
  else if (pct >= 0.6) { t = '¡Muy bien, miau!'; m = 'Buen manejo. Repasa la pauta de las que fallaste y quedas listo.'; }
  else if (pct >= 0.4) { t = 'Vas por buen camino'; m = `A mitad de camino, miau. Descarga la ${topic.guide} en la sección Material del sitio y vuelve a intentarlo.`; }
  else { t = 'A practicar, michi'; m = `Este tema necesita más repaso. Estudia la ${topic.guide} en el sitio, revisa cada pauta y vuelve: yo te espero. (=^-ω-^=)`; }
  document.getElementById('finalTitle').textContent = t;
  document.getElementById('finalMsg').textContent = m;
}

document.getElementById('nextBtn').addEventListener('click', next);
document.getElementById('retryBtn').addEventListener('click', () => startTopic(TOPICS.indexOf(topic)));
document.getElementById('quitBtn').addEventListener('click', backMenu);
document.getElementById('homeBtn').addEventListener('click', backMenu);
function backMenu() {
  quizScreen.classList.add('hidden');
  finalScreen.classList.add('hidden');
  menuScreen.classList.remove('hidden');
}

document.addEventListener('keydown', e => {
  if (!quizScreen.classList.contains('hidden')) {
    const i = ['a','b','c','d'].indexOf(e.key.toLowerCase());
    const n = ['1','2','3','4'].indexOf(e.key);
    if (!answered && (i>=0 || n>=0)) answer(i>=0 ? i : n);
    else if (answered && e.key === 'Enter') next();
  }
});
</script>
