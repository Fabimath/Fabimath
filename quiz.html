<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gatos Quiz — Fabimath</title>
<meta name="description" content="Quiz 8-bits de probabilidad y estadística: elige tu gato y tu tema, responde alternativas y revisa la pauta.">
<link rel="icon" type="image/png" href="logo/fabimath_logo.png">

<style>
  :root {
    --royal: #1550e0;
    --azure: #2f81f7;
    --sky: #63b3ff;
    --ink: #0d1b34;
    --panel: #13234a;
    --panel-2: #0f1c3d;
    --text: #eaf2ff;
    --gold: #ffd75e;
    --mint: #4ade80;
    --coral: #ff6b61;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background:
      radial-gradient(900px 500px at 50% -10%, #16295e 0%, transparent 60%),
      var(--ink);
    color: var(--text);
    font-family: 'Press Start 2P', monospace;
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    padding: 18px 16px 50px;
    overflow-x: hidden;
  }
  .mosaic { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .mosaic i {
    position: absolute; display: block; border-radius: 4px; opacity: .5;
    animation: drift 16s ease-in-out infinite;
  }
  @keyframes drift { 0%,100% { transform: translateY(0);} 50% { transform: translateY(-18px);} }
  @media (prefers-reduced-motion: reduce) { .mosaic i, .cat-box, .cursor::after { animation: none !important; } }

  .topbar {
    width: 100%; max-width: 760px; z-index: 1;
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 22px;
  }
  .topbar a {
    color: var(--sky); font-size: 9px; text-decoration: none;
    display: flex; align-items: center; gap: 8px;
  }
  .topbar a img { width: 26px; height: 26px; border-radius: 7px; }
  .topbar a:hover { color: #fff; }

  h1 {
    z-index: 1;
    font-family: 'Baloo 2', sans-serif;
    font-size: clamp(28px, 6vw, 42px); font-weight: 800;
    background: linear-gradient(100deg, var(--sky), #9ecbff);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    text-align: center;
  }
  .subtitle { z-index: 1; font-size: 8px; color: #7fa4d9; margin: 6px 0 26px; letter-spacing: .12em; text-align: center; }

  .screen { z-index: 1; width: 100%; max-width: 760px; }
  .hidden { display: none !important; }

  /* ---------- TOPIC MENU ---------- */
  .menu-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 16px;
  }
  .topic-card {
    background: linear-gradient(180deg, var(--panel), var(--panel-2));
    border: 3px solid #27407a;
    border-radius: 14px;
    padding: 18px 14px 16px;
    cursor: pointer;
    text-align: center;
    transition: transform .15s ease, border-color .15s ease, box-shadow .15s ease;
    color: var(--text);
    font-family: 'Press Start 2P', monospace;
  }
  .topic-card:hover, .topic-card:focus-visible {
    transform: translateY(-4px);
    border-color: var(--sky);
    box-shadow: 0 0 20px rgba(99,179,255,.25);
  }
  .topic-card .mini-cat { display: inline-grid; grid-template-columns: repeat(20, 4px); grid-auto-rows: 4px; margin-bottom: 12px; }
  .topic-card .mini-cat div { width: 4px; height: 4px; }
  .topic-card .t-name { font-size: 9px; line-height: 1.8; color: var(--sky); }
  .topic-card .t-count { font-size: 7px; color: #5f7fb4; margin-top: 6px; }

  /* ---------- QUIZ ---------- */
  .quiz-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; font-size: 8px; color: #7fa4d9; }
  .quiz-head .score { color: var(--gold); }
  .quiz-body { display: flex; gap: 18px; align-items: flex-start; }
  @media (max-width: 620px) { .quiz-body { flex-direction: column; align-items: center; } }

  .cat-box { flex-shrink: 0; position: relative; animation: idle 3.2s ease-in-out infinite; }
  @keyframes idle { 0%,100% { transform: translateY(0);} 50% { transform: translateY(-5px);} }
  .cat-box.talking { animation: hop .4s steps(2) infinite; }
  @keyframes hop { 0%,100% { transform: translateY(0);} 50% { transform: translateY(-6px);} }
  #catGrid { display: grid; grid-template-columns: repeat(20, 7px); grid-auto-rows: 7px; }
  #catGrid div { width: 7px; height: 7px; }

  .q-panel { flex: 1; width: 100%; }
  .dialog {
    background: linear-gradient(180deg, var(--panel), var(--panel-2));
    border: 3px solid var(--azure);
    border-radius: 14px;
    box-shadow: 0 0 24px rgba(47,129,247,.2);
    padding: 18px 16px;
    min-height: 90px;
    position: relative;
    margin-bottom: 14px;
  }
  .dialog .speaker {
    position: absolute; top: -14px; left: 14px;
    background: linear-gradient(100deg, var(--royal), var(--azure));
    color: #fff; font-size: 8px; letter-spacing: .08em;
    padding: 5px 11px; border-radius: 8px;
    border: 2px solid #0a2d7a;
  }
  #qText { font-size: 9.5px; line-height: 2.1; white-space: pre-wrap; }

  .alts { display: flex; flex-direction: column; gap: 10px; }
  .alt-btn {
    background: #0a1430;
    border: 3px solid #27407a;
    border-radius: 12px;
    color: var(--text);
    font-family: 'Press Start 2P', monospace;
    font-size: 8.5px;
    line-height: 1.9;
    padding: 13px 14px;
    cursor: pointer;
    text-align: left;
    display: flex; gap: 10px; align-items: baseline;
    transition: border-color .15s, background .15s;
  }
  .alt-btn:hover:not(:disabled), .alt-btn:focus-visible { border-color: var(--sky); background: #0e1c42; }
  .alt-btn:disabled { cursor: default; }
  .alt-btn .key { color: var(--gold); flex-shrink: 0; }
  .alt-btn.correct { border-color: var(--mint); background: rgba(74,222,128,.12); }
  .alt-btn.wrong { border-color: var(--coral); background: rgba(255,107,97,.12); }

  .pauta {
    display: none;
    margin-top: 14px;
    background: rgba(99,179,255,.07);
    border: 3px solid var(--sky);
    border-radius: 12px;
    padding: 14px;
    font-size: 8.5px;
    line-height: 2.2;
  }
  .pauta .p-title { color: var(--gold); margin-bottom: 6px; }
  .pauta.good { border-color: var(--mint); }
  .pauta.bad { border-color: var(--coral); }

  .next-row { margin-top: 14px; display: flex; gap: 10px; justify-content: flex-end; }
  .px-btn {
    background: linear-gradient(180deg, var(--azure), var(--royal));
    border: 3px solid #0a2d7a;
    border-radius: 12px;
    color: #fff;
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    padding: 13px 18px;
    cursor: pointer;
  }
  .px-btn:hover { filter: brightness(1.15); }
  .px-btn.ghost { background: transparent; color: var(--sky); border-color: var(--royal); }
  .px-btn.ghost:hover { background: var(--royal); color: #fff; }

  /* ---------- RESULT ---------- */
  .final {
    text-align: center;
    background: linear-gradient(180deg, var(--panel), var(--panel-2));
    border: 3px solid var(--sky);
    border-radius: 14px;
    padding: 30px 20px;
  }
  .final .big { font-size: 15px; line-height: 2.2; color: var(--gold); margin: 12px 0; }
  .final p { font-size: 9px; line-height: 2.2; color: #9fb8e8; }
  .hint { font-size: 7.5px; color: #5f7fb4; text-align: center; margin-top: 16px; line-height: 2; }
  :focus-visible { outline: 3px solid var(--gold); outline-offset: 2px; }
</style>
</head>

<script>
/* ============ PIXEL CATS ============ */
/* palette codes: K outline, B body, b shade, W white, E eye, G shine, P pink, Y collar, A accessory 1, C accessory 2 */
function makeSprite(body, shade, acc1, acc2, accessory) {
  const P = {
    '.': null, 'K': '#0a1226', 'B': body, 'b': shade,
    'W': '#ffffff', 'E': '#0a1226', 'G': '#cfe8ff', 'P': '#ff9ecb',
    'Y': '#ffd75e', 'A': acc1, 'C': acc2
  };
  /* base cat 20x16 (head+body) — 4 hat rows prepended per accessory */
  const base = [
    "...KK..........KK...",
    "..KBBK........KBBK..",
    ".KBPPBK......KBPPBK.",
    ".KBPPBBKKKKKKBBPPBK.",
    ".KBBBBBBBBBBBBBBBBK.",
    "KBBBBBBBBBBBBBBBBBBK",
    "KBBKEGKBBBBBBKEGKBBK",
    "KBBKEEKBbBBbBKEEKBBK",
    "KBBBBBBBWWWWBBBBBBBK",
    "KBbBBBBWWPPWWBBBBbBK",
    ".KBBBBBBWWWWBBBBBBK.",
    ".KBBYYYYYYYYYYYYBBK.",
    ".KBBBBBBBBBBBBBBBBK.",
    ".KBbBBBBBBBBBBBBbBK.",
    "..KBBKKBBBBBBKKBBK..",
    "...KK..KKKKKK..KK..."
  ];
  let rows = base.slice();
  if (accessory === 'glasses') {
    rows[6] = "KBBAAAABBBBBBAAAABBK";
    rows[7] = "KBBAEEABbBBbBAEEABBK";
  } else if (accessory === 'bowtie') {
    rows[11] = ".KBBYYYAACAAYYYYBBK.";
    rows[12] = ".KBBBBBAACAABBBBBBK.";
  } else if (accessory === 'wizard') {
    rows = [
      ".........AA.........",
      "........AACA........",
      ".......AAAAAA.......",
      "....AAAAAACAAAAA....",
      ...rows
    ];
  } else if (accessory === 'headphones') {
    rows[4] = ".KAABBBBBBBBBBBBAAK.";
    rows[5] = "KAABBBBBBBBBBBBBBAAK";
    rows[6] = "KAAKEGKBBBBBBKEGKAAK";
    rows[0] = "...KKAAAAAAAAAAKK...";
    rows[1] = "..KBBKAAAAAAAAKBBK..";
  } else if (accessory === 'gradcap') {
    rows = [
      "....AAAAAAAAAAAA....",
      ".AAAAAAAAAAAAAAAAAC.",
      "......AAAAAAA....C..",
      "......AAAAAAA....C..",
      ...rows
    ];
  } else if (accessory === 'star') {
    rows[11] = ".KBBYYYYYACAYYYYBBK.";
  }
  return { rows, P };
}

const TOPICS = [
  {
    id: 'uni', name: 'Estadística Univariada', cat: 'AZULEJO',
    sprite: makeSprite('#3b8bff', '#2f6fe0', '#ffd75e', '#e8342a', 'star'),
    msg: 'miau! yo domino tablas,\nmedias y percentiles'
  },
  {
    id: 'biv', name: 'Estadística Bivariada', cat: 'PROFE MICHI',
    sprite: makeSprite('#34d399', '#0ea371', '#0a1226', '#0a1226', 'glasses'),
    msg: 'correlación no es\ncausalidad, miau~'
  },
  {
    id: 'cla', name: 'Probabilidad Clásica', cat: 'DON BIGOTES',
    sprite: makeSprite('#fb923c', '#ea6a12', '#e8342a', '#ffd75e', 'bowtie'),
    msg: 'casos favorables sobre\ncasos totales, miau'
  },
  {
    id: 'con', name: 'Prob. Condicional y Bayes', cat: 'MERLÍN',
    sprite: makeSprite('#a78bfa', '#7c5cf0', '#4c2ea8', '#ffd75e', 'wizard'),
    msg: 'la magia de actualizar\ncreencias, miau ✦'
  },
  {
    id: 'nor', name: 'Distribución Normal', cat: 'DJ CAMPANA',
    sprite: makeSprite('#22d3ee', '#0aa8c4', '#0a1226', '#ffd75e', 'headphones'),
    msg: 'todo converge a la\ncampana, miau~'
  },
  {
    id: 'tes', name: 'Test de Hipótesis', cat: 'DR. GATUNO',
    sprite: makeSprite('#fbbf24', '#e09112', '#0a1226', '#ffd75e', 'gradcap'),
    msg: 'rechazar o no rechazar,\nesa es la cuestión miau'
  }
];

const QUESTIONS = {
  uni: [
    { q: "Porciones diarias y frecuencias:\n3→5, 5→11, 7→16, 9→8, 11→4.\n\n¿Cuál es la MODA?",
      alts: ["5 porciones", "7 porciones", "9 porciones", "16 porciones"], ok: 1,
      pauta: "La moda es el VALOR con mayor frecuencia. La frecuencia más alta es 16, que corresponde al valor 7 porciones. Ojo: 16 es la frecuencia, no la moda." },
    { q: "Facultad AURORA: promedio 5,8 y desviación estándar 1,4.\n\n¿Coeficiente de variación?",
      alts: ["24,14%", "12,90%", "41,43%", "8,12%"], ok: 0,
      pauta: "CV = s/x̄ ×100 = 1,4/5,8 ×100 ≈ 24,14%. Mide dispersión relativa: permite comparar variabilidad entre grupos con distintas escalas." },
    { q: "Datos: 45,50,60,60,70,75,75,75,85,95 (suma 690, n=10).\n\n¿Promedio y mediana?",
      alts: ["x̄=69 ; Me=72,5", "x̄=72,5 ; Me=69", "x̄=69 ; Me=75", "x̄=75 ; Me=72,5"], ok: 0,
      pauta: "x̄ = 690/10 = 69. Mediana: con n=10 par, promedio de los valores 5° y 6° ordenados: (70+75)/2 = 72,5." },
    { q: "Pesos al nacer agrupados, n=40.\nIntervalo P80: [3,5–4,0), F_ant=30, f=7, a=0,5.\n\n¿Percentil 80?",
      alts: ["3,20 kg", "3,50 kg", "3,64 kg", "3,86 kg"], ok: 2,
      pauta: "P80 = 3,5 + ((0,8·40 − 30)/7)·0,5 = 3,5 + (2/7)·0,5 ≈ 3,64 kg. El 20% más pesado pesa al menos 3,64 kg." },
    { q: "Tipos de lesión (cualitativa nominal).\n\n¿Se puede calcular la MEDIANA?",
      alts: ["Sí, ordenando frecuencias", "Sí, si n es impar", "No, no hay orden natural", "Solo si hay pocas categorías"], ok: 2,
      pauta: "La mediana requiere ordenar los datos. En una variable cualitativa NOMINAL las categorías no tienen orden natural, por lo que la mediana no está definida." }
  ],
  biv: [
    { q: "Resumen: Cov(X,Y)=6, s²x=4, s²y=10.\n\n¿Pendiente de la recta de regresión?",
      alts: ["β₁ = 0,60", "β₁ = 1,50", "β₁ = 2,40", "β₁ = 0,95"], ok: 1,
      pauta: "β₁ = Cov(X,Y)/s²x = 6/4 = 1,5. Cuidado: el denominador es la VARIANZA de X (s²x), no la desviación estándar." },
    { q: "Con Cov=6, sx=2, sy=√10≈3,1623.\n\n¿Coeficiente de correlación r?",
      alts: ["r ≈ 0,60", "r ≈ 0,79", "r ≈ 0,9487", "r ≈ 1,20"], ok: 2,
      pauta: "r = Cov/(sx·sy) = 6/(2·3,1623) ≈ 0,9487. Asociación lineal positiva muy fuerte. r siempre está entre −1 y 1." },
    { q: "Modelo en R: R² = 0,0103,\np-value del test F = 0,719.\n\n¿Qué se concluye (α=0,05)?",
      alts: ["Modelo excelente", "X es buen predictor", "Modelo no significativo", "Falta información"], ok: 2,
      pauta: "p=0,719 > 0,05: no se rechaza H₀:β₁=0. Además R²=1,03% de variabilidad explicada. El modelo NO es significativo: X no predice a Y." },
    { q: "Recta ajustada: ŷ = 3 + 1,5x\n(sueldo en cientos de miles).\n\n¿Predicción para x=10 años?",
      alts: ["$1.500.000", "$1.800.000", "$1.300.000", "$3.000.000"], ok: 1,
      pauta: "ŷ(10) = 3 + 1,5·10 = 18 cientos de miles = $1.800.000. Siempre reemplaza en la ecuación ajustada y cuida las unidades." },
    { q: "Modelo A: ln(Y)=1,6094+0,2231X.\n\n¿Predicción de Y para X=10?",
      alts: ["Y ≈ 3,84", "Y ≈ 18,0", "Y ≈ 46,5", "Y ≈ 2,23"], ok: 2,
      pauta: "ln(Y)=1,6094+2,231=3,8404. Hay que DESTRANSFORMAR: Y = e^3,8404 ≈ 46,5. Error típico: dejar 3,84 como respuesta final." }
  ],
  cla: [
    { q: "400 pacientes: 150 fumadores,\n100 hipertensos, 60 ambos.\n\n¿P(Fumador)?",
      alts: ["0,375", "0,25", "0,15", "0,60"], ok: 0,
      pauta: "P(F) = 150/400 = 0,375. Probabilidad clásica: casos favorables sobre casos totales." },
    { q: "Mismos datos.\n\n¿P(Hipertenso ∪ Fumador)?",
      alts: ["0,625", "0,475", "0,525", "0,375"], ok: 1,
      pauta: "P(H∪F) = P(H)+P(F)−P(H∩F) = 0,25+0,375−0,15 = 0,475. No olvides restar la intersección (se cuenta dos veces)." },
    { q: "P(H)=0,25, P(F)=0,375,\nP(H∩F)=0,15.\n\n¿Son independientes H y F?",
      alts: ["Sí, porque P(H∩F)>0", "Sí, P(H)·P(F)=P(H∩F)", "No: 0,25·0,375≠0,15", "No se puede saber"], ok: 2,
      pauta: "Independencia ⟺ P(H∩F)=P(H)·P(F). Aquí 0,25·0,375=0,09375 ≠ 0,15 → NO son independientes: fumar y ser hipertenso están asociados." },
    { q: "Vacunas: L1 50% (2% fallas),\nL2 30% (3%), L3 20% (5%).\n\n¿P(dosis con falla)?",
      alts: ["0,10", "0,033", "0,029", "0,05"], ok: 2,
      pauta: "Probabilidad total: P(D) = 0,5·0,02 + 0,3·0,03 + 0,2·0,05 = 0,010+0,009+0,010 = 0,029." }
  ],
  con: [
    { q: "Urgencias: P(Ped)=0,58, P(Neu)=0,42.\nP(H|Ped)=0,18, P(H|Neu)=0,63.\n\n¿P(Hospitalización)?",
      alts: ["0,405", "0,369", "0,81", "0,246"], ok: 1,
      pauta: "Probabilidad total: P(H) = 0,58·0,18 + 0,42·0,63 = 0,1044 + 0,2646 = 0,369." },
    { q: "Con P(H)=0,369.\n\n¿P(Pediatría | NO hospitalizado)?",
      alts: ["0,58", "0,4756", "0,7537", "0,82"], ok: 2,
      pauta: "Bayes: P(Ped|H̄) = P(Ped)·P(H̄|Ped)/P(H̄) = (0,58·0,82)/0,631 ≈ 0,7537. Nota: P(H̄|Ped)=1−0,18=0,82 y P(H̄)=1−0,369=0,631." },
    { q: "Test diabetes (conjuntas):\nP(+ ∩ D)=0,16, P(D)=0,20.\n\n¿Sensibilidad P(+|D)?",
      alts: ["0,16", "0,64", "0,80", "0,20"], ok: 2,
      pauta: "P(+|D) = P(+∩D)/P(D) = 0,16/0,20 = 0,80. La condicional divide la conjunta por la probabilidad del suceso condicionante." },
    { q: "P(− ∩ NoD)=0,71, P(−)=0,75.\n\n¿Valor predictivo negativo P(NoD|−)?",
      alts: ["0,71", "0,8875", "0,9467", "0,75"], ok: 2,
      pauta: "VPN = P(NoD|−) = 0,71/0,75 ≈ 0,9467 (94,67%). Cuidado con el denominador: es el total del test negativo, no el total de sanos." },
    { q: "P(D)=0,029; L3 aporta 0,2·0,05=0,010.\n\n¿P(L3 | falla)?",
      alts: ["0,05", "0,20", "0,3448", "0,50"], ok: 2,
      pauta: "Bayes: P(L3|D) = 0,010/0,029 ≈ 0,3448. Aunque L3 tiene la mayor tasa de fallas (5%), aporta pocas dosis, por eso no domina." }
  ],
  nor: [
    { q: "X ~ N(45, 8).\n\n¿P(X < 50)?",
      alts: ["0,7340", "0,625", "0,2660", "0,8944"], ok: 0,
      pauta: "Z = (50−45)/8 = 0,625 → P = Φ(0,625) ≈ 0,7340. Primero estandariza, luego busca en la tabla. 0,625 es el valor z, no la probabilidad." },
    { q: "X ~ N(45, 8).\n\n¿P(40 < X < 55)?",
      alts: ["0,8944", "0,6284", "0,2660", "0,7340"], ok: 1,
      pauta: "z₁=(40−45)/8=−0,625, z₂=(55−45)/8=1,25. P = Φ(1,25)−Φ(−0,625) = 0,8944−0,2660 ≈ 0,6284." },
    { q: "Presión ~ N(128, 10).\n\n¿P(X > 148)?",
      alts: ["0,9772", "0,4772", "0,0228", "0,0456"], ok: 2,
      pauta: "Z = (148−128)/10 = 2. P(X>148) = 1−Φ(2) = 1−0,9772 = 0,0228. Para 'mayor que' usa el complemento." },
    { q: "Colesterol ~ N(190, 20).\n\n¿Percentil 90? (z₀,₉₀≈1,28)",
      alts: ["215,6 mg/dL", "190 mg/dL", "210 mg/dL", "164,4 mg/dL"], ok: 0,
      pauta: "Transformación inversa: x = μ + z·σ = 190 + 1,28·20 = 215,6. El 10% con valores más altos supera 215,6 mg/dL." }
  ],
  tes: [
    { q: "Se sospecha que la espera es\nMAYOR a 30 min declarados.\n\n¿Hipótesis correctas?",
      alts: ["H₀:μ=30 vs H₁:μ≠30", "H₀:μ=30 vs H₁:μ>30", "H₀:μ>30 vs H₁:μ=30", "H₀:μ≤30 vs H₁:μ<30"], ok: 1,
      pauta: "La sospecha ('mayor que') va en H₁: test unilateral derecho. H₀ siempre lleva la igualdad de referencia (μ=30)." },
    { q: "n=64, x̄=33,2, s=8,1, μ₀=30.\n\n¿Estadístico Z?",
      alts: ["Z ≈ 1,58", "Z ≈ 0,40", "Z ≈ 3,16", "Z ≈ 25,3"], ok: 2,
      pauta: "SE = 8,1/√64 = 1,0125. Z = (33,2−30)/1,0125 ≈ 3,16. Como 3,16 > 1,645, se rechaza H₀: la espera supera los 30 min." },
    { q: "Envases: H₀:μ=500 vs H₁:μ≠500.\nZ calc = −3,0 y α=0,05.\n\n¿Decisión?",
      alts: ["No rechazar H₀", "Rechazar H₀", "Aceptar H₁ sin test", "Aumentar α"], ok: 1,
      pauta: "Test bilateral: críticos ±1,96. |−3,0| > 1,96 (p≈0,0027 < 0,05) → se rechaza H₀: el contenido difiere de 500 ml." },
    { q: "Campaña: H₀:p=0,60 vs H₁:p>0,60.\nn=200, 132 éxitos.\n\n¿Z y conclusión (α=0,05)?",
      alts: ["Z≈1,73: rechaza H₀", "Z≈1,73: no rechaza", "Z≈0,06: no rechaza", "Z≈6,0: rechaza H₀"], ok: 0,
      pauta: "p̂=0,66. SE₀=√(0,6·0,4/200)≈0,0346. Z=(0,66−0,60)/0,0346≈1,73 > 1,645 → se rechaza H₀: la campaña fue exitosa. OJO: el SE usa p₀=0,6." }
  ]
};

/* ============ RENDER HELPERS ============ */
function renderSprite(container, sprite, blink) {
  container.innerHTML = '';
  sprite.rows.forEach((row, ri) => {
    for (const ch of row) {
      const d = document.createElement('div');
      let c = sprite.P[ch];
      if (blink && (ch === 'E' || ch === 'G')) c = sprite.P['B'];
      if (c) d.style.background = c;
      container.appendChild(d);
    }
  });
}

/* ============ MENU ============ */
const menuGrid = document.getElementById('menuGrid');
TOPICS.forEach((t, i) => {
  const card = document.createElement('button');
  card.className = 'topic-card';
  card.innerHTML = '<span class="mini-cat"></span><div class="t-name">' + t.cat + '</div><div class="t-count">' + t.name + ' · ' + QUESTIONS[t.id].length + ' preguntas</div>';
  const mini = card.querySelector('.mini-cat');
  mini.style.gridTemplateColumns = 'repeat(20, 4px)';
  renderSprite(mini, t.sprite, false);
  card.addEventListener('click', () => startTopic(i));
  menuGrid.appendChild(card);
});

/* ============ QUIZ STATE ============ */
const menuScreen = document.getElementById('menuScreen');
const quizScreen = document.getElementById('quizScreen');
const finalScreen = document.getElementById('finalScreen');
const catGrid = document.getElementById('catGrid');
const catBox = document.getElementById('catBox');
const qText = document.getElementById('qText');
const altsEl = document.getElementById('alts');
const pautaEl = document.getElementById('pauta');
const nextBtn = document.getElementById('nextBtn');
const scoreLabel = document.getElementById('scoreLabel');

let topic = null, qIdx = 0, score = 0, answered = false, blinkTimer = null;

function startTopic(i) {
  topic = TOPICS[i];
  qIdx = 0; score = 0;
  document.getElementById('topicLabel').textContent = topic.name.toUpperCase();
  document.getElementById('catName').textContent = topic.cat;
  menuScreen.classList.add('hidden');
  finalScreen.classList.add('hidden');
  quizScreen.classList.remove('hidden');
  renderSprite(catGrid, topic.sprite, false);
  clearInterval(blinkTimer);
  blinkTimer = setInterval(() => {
    renderSprite(catGrid, topic.sprite, true);
    setTimeout(() => renderSprite(catGrid, topic.sprite, false), 150);
  }, 3800);
  showIntroThenQuestion();
}

function showIntroThenQuestion() {
  typeText(topic.msg + '\n\n¡vamos con la pregunta 1!', () => setTimeout(showQuestion, 600));
}

function typeText(msg, done) {
  catBox.classList.add('talking');
  qText.textContent = '';
  let i = 0;
  const t = setInterval(() => {
    qText.textContent += msg[i++];
    if (i >= msg.length) { clearInterval(t); catBox.classList.remove('talking'); if (done) done(); }
  }, 22);
}

function showQuestion() {
  const Q = QUESTIONS[topic.id][qIdx];
  answered = false;
  pautaEl.style.display = 'none';
  pautaEl.className = 'pauta';
  nextBtn.classList.add('hidden');
  document.getElementById('qNum').textContent = 'PREGUNTA ' + (qIdx + 1) + '/' + QUESTIONS[topic.id].length;
  scoreLabel.textContent = score + ' ✓';
  qText.textContent = Q.q;
  altsEl.innerHTML = '';
  const letters = ['A', 'B', 'C', 'D'];
  Q.alts.forEach((a, i) => {
    const b = document.createElement('button');
    b.className = 'alt-btn';
    b.innerHTML = '<span class="key">' + letters[i] + ')</span><span>' + a + '</span>';
    b.addEventListener('click', () => answer(i));
    altsEl.appendChild(b);
  });
}

function answer(i) {
  if (answered) return;
  answered = true;
  const Q = QUESTIONS[topic.id][qIdx];
  const btns = altsEl.querySelectorAll('.alt-btn');
  btns.forEach(b => b.disabled = true);
  btns[Q.ok].classList.add('correct');
  const good = i === Q.ok;
  if (good) { score++; scoreLabel.textContent = score + ' ✓'; }
  else btns[i].classList.add('wrong');
  pautaEl.innerHTML = '<div class="p-title">' + (good ? '✓ ¡CORRECTO, MIAU!' : '✗ INCORRECTO... LA PAUTA:') + '</div>' + Q.pauta;
  pautaEl.classList.add(good ? 'good' : 'bad');
  pautaEl.style.display = 'block';
  nextBtn.classList.remove('hidden');
  nextBtn.textContent = (qIdx + 1 < QUESTIONS[topic.id].length) ? 'SIGUIENTE ►' : 'VER RESULTADO ★';
  nextBtn.focus();
}

function next() {
  qIdx++;
  if (qIdx < QUESTIONS[topic.id].length) showQuestion();
  else showFinal();
}

function showFinal() {
  quizScreen.classList.add('hidden');
  finalScreen.classList.remove('hidden');
  const total = QUESTIONS[topic.id].length;
  renderSprite(document.getElementById('finalCatGrid'), topic.sprite, false);
  document.getElementById('finalScore').textContent = score + ' / ' + total;
  const pct = score / total;
  let msg;
  if (pct === 1) msg = '¡PURRFECTO! ' + topic.cat + ' está orgulloso de ti. Dominas ' + topic.name + '. ᕕ(=^･ω･^=)ᕗ';
  else if (pct >= 0.7) msg = '¡Muy bien, miau! Repasa la pauta de las que fallaste y quedas listo para la prueba.';
  else if (pct >= 0.4) msg = 'Vas a mitad de camino, miau. Revisa la guía de ' + topic.name + ' en la sección Material y vuelve a intentarlo.';
  else msg = 'Miau... este tema necesita más práctica. Descarga la guía en el sitio, estudia la pauta y vuelve: ' + topic.cat + ' te espera. (=^-ω-^=)';
  document.getElementById('finalMsg').textContent = msg;
}

nextBtn.addEventListener('click', next);
document.getElementById('menuBtn').addEventListener('click', backToMenu);
document.getElementById('finalMenuBtn').addEventListener('click', backToMenu);
document.getElementById('retryBtn').addEventListener('click', () => startTopic(TOPICS.indexOf(topic)));

function backToMenu() {
  clearInterval(blinkTimer);
  quizScreen.classList.add('hidden');
  finalScreen.classList.add('hidden');
  menuScreen.classList.remove('hidden');
}

/* keyboard: A-D answer, Enter next */
document.addEventListener('keydown', e => {
  if (quizScreen.classList.contains('hidden')) return;
  const k = e.key.toLowerCase();
  const idx = ['a', 'b', 'c', 'd'].indexOf(k);
  const num = ['1', '2', '3', '4'].indexOf(e.key);
  if (!answered && (idx >= 0 || num >= 0)) {
    const btns = altsEl.querySelectorAll('.alt-btn');
    const i = idx >= 0 ? idx : num;
    if (btns[i]) answer(i);
  } else if (answered && e.key === 'Enter') {
    next();
  }
});
</script>
