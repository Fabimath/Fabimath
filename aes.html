<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gatito AES — Fabimath</title>
<meta name="description" content="Minijuego 8-bits: el gatito de Fabimath calcula tu eximición y la nota que necesitas en el examen de AES.">
<link rel="icon" type="image/png" href="logo/fabimath_logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Baloo+2:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --royal: #1550e0;
    --azure: #2f81f7;
    --sky: #63b3ff;
    --ink: #0d1b34;
    --panel: #13234a;
    --panel-2: #0f1c3d;
    --text: #eaf2ff;
    --gold: #ffd75e;
    --mint: #4ade80;
    --coral: #ff6b61;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background:
      radial-gradient(900px 500px at 50% -10%, #16295e 0%, transparent 60%),
      var(--ink);
    color: var(--text);
    font-family: 'Press Start 2P', monospace;
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    padding: 18px 16px 40px;
    overflow-x: hidden;
  }
  /* floating mosaic blocks — brand signature */
  .mosaic { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .mosaic i {
    position: absolute; display: block; border-radius: 4px; opacity: .5;
    animation: drift 16s ease-in-out infinite;
  }
  @keyframes drift {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-18px); }
  }
  @media (prefers-reduced-motion: reduce) {
    .mosaic i, .cat-stage, #tail, .paw, .cursor::after { animation: none !important; }
  }

  .topbar {
    width: 100%; max-width: 660px; z-index: 1;
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 26px;
  }
  .topbar a.back {
    color: var(--sky); font-size: 9px; text-decoration: none;
    display: flex; align-items: center; gap: 8px;
  }
  .topbar a.back img { width: 26px; height: 26px; border-radius: 7px; }
  .topbar a.back:hover { color: #fff; }

  h1 {
    z-index: 1;
    font-family: 'Baloo 2', sans-serif;
    font-size: clamp(30px, 6vw, 44px); font-weight: 800;
    background: linear-gradient(100deg, var(--sky), #9ecbff);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    margin-bottom: 4px; text-align: center;
  }
  .subtitle { z-index: 1; font-size: 8px; color: #7fa4d9; margin-bottom: 26px; letter-spacing: .12em; }

  .game { z-index: 1; width: 100%; max-width: 660px; display: flex; flex-direction: column; align-items: center; gap: 20px; }

  /* ---------- PAW PROGRESS ---------- */
  .paws { display: flex; gap: 10px; }
  .paw {
    font-size: 15px; filter: grayscale(1) brightness(.5); transition: all .3s ease;
  }
  .paw.on { filter: none; transform: scale(1.15); }

  /* ---------- CAT ---------- */
  .cat-stage { position: relative; height: 170px; display: flex; align-items: flex-end; animation: idle 3.2s ease-in-out infinite; }
  @keyframes idle { 0%,100% { transform: translateY(0);} 50% { transform: translateY(-5px);} }
  .cat-stage.talking { animation: hop .4s steps(2) infinite; }
  @keyframes hop { 0%,100% { transform: translateY(0);} 50% { transform: translateY(-6px);} }
  #cat { display: grid; grid-template-columns: repeat(20, 8px); grid-auto-rows: 8px; position: relative; z-index: 2; }
  #cat div { width: 8px; height: 8px; }
  #tail {
    position: absolute; right: -26px; bottom: 16px; z-index: 1;
    display: grid; grid-template-columns: repeat(4, 8px); grid-auto-rows: 8px;
    transform-origin: left bottom;
    animation: wag 1.4s ease-in-out infinite;
  }
  @keyframes wag { 0%,100% { transform: rotate(0deg);} 50% { transform: rotate(-18deg);} }
  #tail div { width: 8px; height: 8px; }
  .shadow {
    position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%);
    width: 130px; height: 14px; border-radius: 50%;
    background: rgba(0,0,0,0.35); filter: blur(3px);
  }
  .zzz { position: absolute; right: -46px; top: -4px; color: var(--sky); font-size: 11px; animation: blink 1.2s steps(2) infinite; display: none; }
  @keyframes blink { 50% { opacity: 0; } }
  .heart { position: absolute; left: -34px; top: 6px; font-size: 15px; display: none; animation: floatup 1.6s ease infinite; }
  @keyframes floatup { 0% { transform: translateY(0); opacity: 1;} 100% { transform: translateY(-22px); opacity: 0;} }

  /* ---------- DIALOG ---------- */
  .dialog {
    width: 100%;
    background: linear-gradient(180deg, var(--panel), var(--panel-2));
    border: 3px solid var(--azure);
    border-radius: 14px;
    box-shadow: 0 0 0 3px var(--ink), 0 0 24px rgba(47,129,247,.28), 0 10px 30px rgba(0,0,0,.4);
    padding: 26px 22px 22px;
    min-height: 128px;
    position: relative;
  }
  .dialog::after {
    content: ""; position: absolute; top: -13px; left: 46px;
    width: 18px; height: 18px;
    background: var(--panel); border-left: 3px solid var(--azure); border-top: 3px solid var(--azure);
    transform: rotate(45deg); border-radius: 3px 0 0 0;
  }
  .dialog .speaker {
    position: absolute; top: -16px; right: 18px;
    background: linear-gradient(100deg, var(--royal), var(--azure));
    color: #fff; font-size: 8px; letter-spacing: .1em;
    padding: 6px 12px; border-radius: 8px;
    border: 2px solid #0a2d7a;
  }
  #text { font-size: 10.5px; line-height: 2.1; white-space: pre-wrap; word-wrap: break-word; }
  .cursor::after { content: "▌"; animation: blink .8s steps(2) infinite; color: var(--sky); }

  /* ---------- INPUT ---------- */
  .input-row { width: 100%; display: flex; gap: 10px; }
  #answer {
    flex: 1; min-width: 0;
    background: #091430;
    border: 3px solid var(--royal);
    border-radius: 12px;
    color: #fff;
    font-family: 'Press Start 2P', monospace;
    font-size: 12px;
    padding: 15px 14px;
    outline: none;
    caret-color: var(--sky);
    transition: border-color .2s, box-shadow .2s;
  }
  #answer:focus { border-color: var(--sky); box-shadow: 0 0 14px rgba(99,179,255,.35); }
  #answer::placeholder { color: #3d5a94; }
  #enterBtn {
    background: linear-gradient(180deg, var(--azure), var(--royal));
    border: 3px solid #0a2d7a;
    border-radius: 12px;
    color: #fff;
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    padding: 15px 18px;
    cursor: pointer;
    transition: transform .12s ease, filter .2s;
  }
  #enterBtn:hover { filter: brightness(1.15); }
  #enterBtn:active { transform: translateY(2px); }
  .hint { font-size: 7.5px; color: #5f7fb4; text-align: center; line-height: 2; }

  /* ---------- RESULT ---------- */
  .result {
    display: none;
    width: 100%;
    background: linear-gradient(180deg, var(--panel), var(--panel-2));
    border: 3px solid var(--sky);
    border-radius: 14px;
    padding: 22px 20px;
    font-size: 8.5px;
    line-height: 2.4;
    box-shadow: 0 0 24px rgba(99,179,255,.2);
  }
  .result .row { display: flex; justify-content: space-between; gap: 10px; border-bottom: 1px dashed #27407a; padding: 4px 0; }
  .result .row:last-of-type { border-bottom: none; }
  .result .ok { color: var(--mint); }
  .result .bad { color: var(--coral); }
  .result .hl { color: var(--sky); }
  .result .gold { color: var(--gold); }
  .verdict {
    margin-top: 14px; padding: 14px; border-radius: 10px; text-align: center;
    font-size: 9.5px; line-height: 2.2;
  }
  .verdict.win { background: rgba(74,222,128,.1); border: 2px solid var(--mint); }
  .verdict.fight { background: rgba(99,179,255,.08); border: 2px solid var(--sky); }
  .verdict.lose { background: rgba(255,107,97,.08); border: 2px solid var(--coral); }
  #again {
    display: none;
    margin-top: 4px;
    background: transparent; color: var(--sky);
    border: 3px solid var(--royal); border-radius: 12px;
    font-family: 'Press Start 2P', monospace; font-size: 9px;
    padding: 13px 22px; cursor: pointer;
  }
  #again:hover { background: var(--royal); color: #fff; }
  :focus-visible { outline: 3px solid var(--gold); outline-offset: 2px; }
</style>
</head>
<body>
<div class="mosaic" aria-hidden="true">
  <i style="left:5%;  top:14%; width:30px; height:30px; background:#16337a; animation-delay:0s"></i>
  <i style="left:12%; top:64%; width:20px; height:20px; background:#1a3e94; animation-delay:-4s"></i>
  <i style="right:8%;  top:20%; width:36px; height:36px; background:#142c68; animation-delay:-2s"></i>
  <i style="right:18%; top:70%; width:22px; height:22px; background:#1a3e94; animation-delay:-7s"></i>
  <i style="left:30%;  top:8%;  width:16px; height:16px; background:#1f4ab0; animation-delay:-5s"></i>
  <i style="right:34%; top:86%; width:26px; height:26px; background:#16337a; animation-delay:-9s"></i>
</div>

<div class="topbar">
  <a class="back" href="index.html"><img src="logo/fabimath_logo.png" alt="">◀ FABIMATH</a>
  <a class="back" href="quiz.html">QUIZ IC ▶</a>
</div>

<h1>Gatito AES</h1>
<div class="subtitle">CALCULADORA DE EXIMICIÓN · 8-BIT EDITION</div>

<div class="game">
  <div class="paws" id="paws" aria-hidden="true">
    <span class="paw">🐾</span><span class="paw">🐾</span><span class="paw">🐾</span>
    <span class="paw">🐾</span><span class="paw">🐾</span><span class="paw">🐾</span><span class="paw">🐾</span>
  </div>

  <div class="cat-stage" id="catStage">
    <div id="cat" aria-label="Gatito pixelado de Fabimath" role="img"></div>
    <div id="tail"></div>
    <div class="shadow"></div>
    <div class="zzz" id="zzz">Z z z</div>
    <div class="heart" id="heart">💙</div>
  </div>

  <div class="dialog">
    <div class="speaker">GATITO</div>
    <div id="text" class="cursor"></div>
  </div>

  <div class="input-row">
    <input id="answer" autocomplete="off" placeholder="escribe aquí..." aria-label="Tu respuesta" />
    <button id="enterBtn">ENTER ►</button>
  </div>
  <div class="hint">Responde con el teclado y presiona ENTER<br>Notas de 1,0 a 7,0 — sirve coma o punto</div>

  <div class="result" id="result"></div>
  <button id="again">▶ JUGAR DE NUEVO</button>
</div>

<script>
/* ---------- palette ---------- */
const P = {
  '.': null,
  'K': '#0a1226',   // outline
  'B': '#3b8bff',   // body
  'b': '#2f6fe0',   // body shade
  'S': '#1e56c4',   // stripes
  'W': '#ffffff',   // muzzle/chest
  'w': '#dbe9ff',   // fur light shade
  'E': '#0a1226',   // pupil
  'G': '#8fd0ff',   // eye shine
  'P': '#ff9ecb',   // inner ear / nose
  'Y': '#ffd75e',   // collar
  'R': '#e8342a'    // collar tag (logo red)
};

/* 20-wide cat, eyes open */
const CAT_OPEN = [
"...KK..........KK...",
"..KBBK........KBBK..",
".KBPPBK......KBPPBK.",
".KBPPBBKKKKKKBBPPBK.",
".KBBBBBBBBBBBBBBBBK.",
".KBBSBBBBBBBBBBSBBK.",
"KBBBBBBBBBBBBBBBBBBK",
"KBBKEGKBBBBBBKEGKBBK",
"KBBKEEKBbBBbBKEEKBBK",
"KBBBBBBBWWWWBBBBBBBK",
"KBbBBBBWWPPWWBBBBbBK",
"KBbBBBBWWWWWWBBBBbBK",
".KBBBBBBWWWWBBBBBBK.",
".KBBYYYYYYYYYYYYBBK.",
".KBBYYYYRRYYYYYYBBK.",
".KBBBBBBBBBBBBBBBBK.",
".KBbBBBBBBBBBBBBbBK.",
".KBbBBBBBBBBBBBBbBK.",
"..KBBKKBBBBBBKKBBK..",
"...KK..KKKKKK..KK..."
];
/* eyes closed (blink) — rows 7-8 replaced */
const CAT_BLINK = CAT_OPEN.map((r, i) => {
  if (i === 7) return "KBBKKKKBBBBBBKKKKBBK";
  if (i === 8) return "KBBBBBBBBbBBbBBBBBBK";
  return r;
});
const TAIL = [
"..KK",
".KBK",
"KBBK",
"KBK."
];

const catEl = document.getElementById('cat');
function renderCat(sprite) {
  catEl.innerHTML = '';
  sprite.forEach(row => {
    for (const ch of row) {
      const d = document.createElement('div');
      if (P[ch]) d.style.background = P[ch];
      catEl.appendChild(d);
    }
  });
}
renderCat(CAT_OPEN);
const tailEl = document.getElementById('tail');
TAIL.forEach(row => {
  for (const ch of row) {
    const d = document.createElement('div');
    if (P[ch]) d.style.background = P[ch];
    tailEl.appendChild(d);
  }
});
/* blink loop */
setInterval(() => {
  renderCat(CAT_BLINK);
  setTimeout(() => renderCat(CAT_OPEN), 160);
}, 3800);

/* ---------- typewriter ---------- */
const textEl = document.getElementById('text');
const stage = document.getElementById('catStage');
let typing = false;
function say(msg) {
  return new Promise(res => {
    typing = true;
    stage.classList.add('talking');
    textEl.textContent = '';
    let i = 0;
    const t = setInterval(() => {
      textEl.textContent += msg[i++];
      if (i >= msg.length) {
        clearInterval(t);
        typing = false;
        stage.classList.remove('talking');
        res();
      }
    }, 26);
  });
}

/* ---------- game ---------- */
const input = document.getElementById('answer');
const btn = document.getElementById('enterBtn');
const resultEl = document.getElementById('result');
const zzz = document.getElementById('zzz');
const heart = document.getElementById('heart');
const againBtn = document.getElementById('again');
const paws = document.querySelectorAll('.paw');

const fmt = n => n.toFixed(2).replace('.', ',');
function parseNota(s) {
  const v = parseFloat(s.trim().replace(',', '.'));
  if (isNaN(v) || v < 1.0 || v > 7.0) return null;
  return v;
}
function step(n) { paws.forEach((p, i) => p.classList.toggle('on', i < n)); }

let state = 'aes';
const notas = { e: [], c: [], rec: null };

async function start() {
  await say("miau~ hola! soy el gatito de\nFabimath (◕ᴥ◕)\n\n¿Estás dando AES? (si/no)");
}

async function handle(raw) {
  const val = raw.trim().toLowerCase();
  switch (state) {

    case 'aes':
      if (['si','sí','s','yes'].includes(val)) {
        state = 'e1'; step(1);
        heart.style.display = 'block'; setTimeout(() => heart.style.display = 'none', 1800);
        await say("purrfecto!! te ayudo con tus\nnotas (=^･ω･^=)\n\n¿Qué nota sacaste en el\nEJERCICIO 1?");
      } else if (['no','n'].includes(val)) {
        state = 'done';
        zzz.style.display = 'block';
        await say("miau... entonces me vuelvo a\ndormir (=˘ω˘=) zZz\n\nvuelve cuando estés en AES!");
        input.disabled = true; btn.disabled = true; againBtn.style.display = 'block';
      } else {
        await say("miau? responde 'si' o 'no'\n(◕ᴥ◕)ノ");
      }
      break;

    case 'e1': case 'e2': case 'e3': {
      const n = parseNota(val);
      if (n === null) { await say("esa nota no existe miau!\ndebe estar entre 1,0 y 7,0"); break; }
      notas.e.push(n);
      if (state === 'e1') { state = 'e2'; step(2); await say("anotado: " + fmt(n) + " ✓\n\n¿Y en el EJERCICIO 2?"); }
      else if (state === 'e2') { state = 'e3'; step(3); await say("anotado: " + fmt(n) + " ✓\n\n¿Y en el EJERCICIO 3?"); }
      else { state = 'c1'; step(4); await say("ejercicios listos miau ✓\n\n¿Qué nota sacaste en la\nCÁTEDRA 1?"); }
      break;
    }

    case 'c1': case 'c2': {
      const n = parseNota(val);
      if (n === null) { await say("esa nota no existe miau!\ndebe estar entre 1,0 y 7,0"); break; }
      notas.c.push(n);
      if (state === 'c1') { state = 'c2'; step(5); await say("anotado: " + fmt(n) + " ✓\n\n¿Y en la CÁTEDRA 2?"); }
      else { state = 'rec'; step(6); await say("¿Diste la RECUPERATIVA?\n\nescribe la nota, o 'no'\nsi no la diste"); }
      break;
    }

    case 'rec': {
      if (['no','n',''].includes(val)) {
        notas.rec = null; state = 'done'; step(7);
        await finish();
      } else {
        const n = parseNota(val);
        if (n === null) { await say("miau?? escribe una nota entre\n1,0 y 7,0... o 'no'"); break; }
        notas.rec = n; state = 'done'; step(7);
        await finish();
      }
      break;
    }

    case 'done': break;
  }
}

async function finish() {
  input.disabled = true; btn.disabled = true;

  let [c1, c2] = notas.c;
  let recMsg = '';
  if (notas.rec !== null) {
    const worst = Math.min(c1, c2);
    if (notas.rec > worst) {
      if (c1 <= c2) c1 = notas.rec; else c2 = notas.rec;
      recMsg = 'La recuperativa (' + fmt(notas.rec) + ') reemplazó tu peor cátedra (' + fmt(worst) + ')';
    } else {
      recMsg = 'La recuperativa (' + fmt(notas.rec) + ') no supera tu peor cátedra (' + fmt(worst) + ') — sin cambios';
    }
  }

  const PE = notas.e.reduce((a, b) => a + b, 0) / notas.e.length;
  const PC = (c1 + c2) / 2;
  const present = (0.2 * PE + 0.5 * PC) / 0.7;
  const exime = present >= 5.45;

  let html = '';
  if (recMsg) html += '<div class="row"><span class="gold">RECUPERATIVA</span><span>' + recMsg + '</span></div>';
  html += '<div class="row"><span>PROMEDIO EJERCICIOS (PE)</span><span class="hl">' + fmt(PE) + '</span></div>';
  html += '<div class="row"><span>PROMEDIO CÁTEDRAS (PC)</span><span class="hl">' + fmt(PC) + '</span></div>';
  html += '<div class="row"><span>NOTA PRESENTACIÓN (≥ 5,45 exime)</span><span class="hl">' + fmt(present) + '</span></div>';

  if (exime) {
    html += '<div class="verdict win">★ TE EXIMES DEL EXAMEN ★<br>nota final: <span class="ok">' + fmt(present) + '</span><br>miau felicidades!! ᕕ(=^･ω･^=)ᕗ</div>';
    heart.style.display = 'block';
    await say("miré tus notas con mis ojitos\nde gato...\n\nMIAAAU!! TE EXIMES!! ★\n\nnota final: " + fmt(present) + "\nfelicidades!! (=^･ω･^=)ノ彡☆");
  } else {
    const need = (3.95 - 0.2 * PE - 0.5 * PC) / 0.3;
    if (need <= 1.0) {
      html += '<div class="verdict fight">No te eximes, pero con un <span class="ok">1,0</span> en el examen ya apruebas (final ≥ 3,95) miau!</div>';
      await say("no te eximes miau... PERO\ntranqui: incluso con un 1,0\nen el examen apruebas!\n\n(=^-ω-^=) relájate");
    } else if (need > 7.0) {
      html += '<div class="verdict lose">No te eximes, y necesitarías un <span class="bad">' + fmt(need) + '</span> en el examen (más que 7,0)...<br>no es posible aprobar (╥﹏╥)</div>';
      await say("miau... no te eximes y\nnecesitarías más de un 7,0\nen el examen...\n\nno se puede aprobar (╥﹏╥)\nlo siento michi...");
    } else {
      html += '<div class="verdict fight">No te eximes. Para aprobar (final ≥ 3,95) necesitas en el examen:<br><span class="gold" style="font-size:13px">' + fmt(need) + '</span> o más<br>tú puedes miau!! ᕙ(=^･ω･^=)ᕗ</div>';
      await say("no te eximes miau...\n\npara aprobar necesitas un\n" + fmt(need) + " o más en el examen.\n\ntú puedes!! ᕙ(=^･ω･^=)ᕗ");
    }
  }
  resultEl.innerHTML = html;
  resultEl.style.display = 'block';
  againBtn.style.display = 'block';
}

btn.addEventListener('click', async () => {
  if (typing || input.disabled) return;
  const v = input.value; input.value = '';
  await handle(v);
  input.focus();
});
input.addEventListener('keydown', async e => {
  if (e.key === 'Enter' && !typing && !input.disabled) {
    const v = input.value; input.value = '';
    await handle(v);
  }
});
againBtn.addEventListener('click', () => location.reload());

start().then(() => input.focus());
</script>
</body>
</html>
